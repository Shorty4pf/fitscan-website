<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Images</title>
    <style>
        body {
            background: #0a0a0a;
            color: white;
            padding: 50px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            margin: 20px;
            display: inline-block;
            background: red;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <h1>Test des avatars</h1>
    <div class="avatar">
        <img src="avatar1.jpg" alt="Avatar 1">
    </div>
    <div class="avatar">
        <img src="avatar2.jpg" alt="Avatar 2">
    </div>
    <div class="avatar">
        <img src="avatar3.jpg" alt="Avatar 3">
    </div>
    <div class="avatar">
        <img src="avatar4.jpg" alt="Avatar 4">
    </div>
    <div class="avatar">
        <img src="avatar5.jpg" alt="Avatar 5">
    </div>
    <div class="avatar">
        <img src="avatar6.jpg" alt="Avatar 6">
    </div>
    
    <h2>Images directes (sans CSS)</h2>
    <img src="avatar1.jpg" width="150" alt="Test 1">
    <img src="avatar2.jpg" width="150" alt="Test 2">
    <img src="avatar3.jpg" width="150" alt="Test 3">
</body>
</html>
